plugins {
    id 'java'
    id 'jacoco'
    id 'com.gradleup.shadow' version '9.0.0'
    id 'maven-publish'
    id 'com.vanniktech.maven.publish'
}

def libraryName = "jfr-mcp"
def component_version = project.hasProperty("jafar_version") ? project.jafar_version : rootProject.version

repositories {
    mavenCentral()
    mavenLocal()
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

dependencies {
    // Official MCP Java SDK
    implementation platform('io.modelcontextprotocol.sdk:mcp-bom:1.1.1')
    implementation 'io.modelcontextprotocol.sdk:mcp'

    // Jafar dependencies
    implementation project(':shell-core')
    implementation project(':parser')
    implementation project(':hdump-shell')
    implementation project(':pprof-shell')
    testImplementation(testFixtures(project(':pprof-shell')))
    implementation project(':otlp-shell')
    testImplementation(testFixtures(project(':otlp-shell')))

    // Backend plugins (discovered via ServiceLoader)
    runtimeOnly project(':jfr-shell-jafar')

    // Embedded Jetty for HTTP transport
    implementation 'org.eclipse.jetty:jetty-server:12.0.16'
    implementation 'org.eclipse.jetty.ee10:jetty-ee10-servlet:12.0.16'

    // Logging
    implementation 'org.slf4j:slf4j-api:2.0.16'
    runtimeOnly 'ch.qos.logback:logback-classic:1.5.18'

    // Testing
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.3'
    testImplementation 'org.mockito:mockito-core:5.15.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // JMC Writer API for creating test JFR files
    testImplementation 'org.openjdk.jmc:flightrecorder.writer:9.1.0'
}

test {
    useJUnitPlatform()
    // Allocate sufficient heap for tests that load real JFR files
    jvmArgs '-Xmx2g', '-Xms512m'
    // Isolate session persistence from real ~/.jafar data during tests
    systemProperty 'jafar.mcp.sessions.file', "${System.getProperty('java.io.tmpdir')}/jafar-mcp-test-sessions.json"

    // Stress tests are a separate concept from integration tests; always exclude from default `test`.
    exclude '**/JafarMcpStressTest.class'

    // Exclude integration tests by default (require large JFR files)
    // Run with -DenableIntegrationTests=true to include them
    if (System.getProperty('enableIntegrationTests') != 'true') {
        exclude '**/JafarMcpServer*Test.class'
        exclude '**/HandlerLogicIntegrationTest.class'
        exclude '**/SessionRegistryTest.class'
    }

    // Configure Mockito as Java agent for inline mocking in Java 25
    doFirst {
        def mockitoAgent = configurations.testRuntimeClasspath.files.find { it.name.contains('mockito-core') }
        if (mockitoAgent) {
            jvmArgs "-javaagent:${mockitoAgent}"
        }
    }

    // Open Java modules for Mockito instrumentation in Java 25
    jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED'
    jvmArgs '--add-opens', 'java.base/java.util=ALL-UNNAMED'
    jvmArgs '--add-opens', 'java.base/java.lang.invoke=ALL-UNNAMED'

    finalizedBy jacocoTestReport
}

// Integration tests task (slow, loads real JFR files)
tasks.register('integrationTest', Test) {
    description = 'Runs integration tests that load real JFR files (slow)'
    group = 'verification'

    useJUnitPlatform {
        includeTags 'integration'
    }

    // Integration tests need more heap for processing JFR files
    jvmArgs '-Xmx4g', '-Xms512m'

    shouldRunAfter test
}

// End-to-end tests — spawn the MCP server subprocess and drive the real analysis workflow.
// Run with: ./gradlew :jfr-mcp:endToEndTest
// To test the published release: ./gradlew :jfr-mcp:endToEndTest -Dmcp.e2e.use.jbang=true
// To test a specific JFR file:  ./gradlew :jfr-mcp:endToEndTest -Dmcp.e2e.jfr=/path/to/file.jfr
tasks.register('endToEndTest', Test) {
    description = 'Spawns the MCP server as a subprocess and drives the real tool sequence'
    group = 'verification'

    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath

    useJUnitPlatform {
        includeTags 'e2e'
    }

    systemProperties System.properties.subMap(['mcp.e2e.use.jbang', 'mcp.e2e.jbang.cmd', 'mcp.e2e.jfr'])

    jvmArgs '-Xmx512m', '-Xms256m'

    doFirst {
        def mockitoAgent = configurations.testRuntimeClasspath.files.find { it.name.contains('mockito-core') }
        if (mockitoAgent) {
            jvmArgs "-javaagent:${mockitoAgent}"
        }
    }
    jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED'
    jvmArgs '--add-opens', 'java.base/java.util=ALL-UNNAMED'
    jvmArgs '--add-opens', 'java.base/java.lang.invoke=ALL-UNNAMED'

    dependsOn shadowJar
    shouldRunAfter test
}

// Stress tests — exercise the full stdio pipeline under load. Exclude from default `test`.
tasks.register('stressTest', Test) {
    description = 'Runs reliability stress tests over the in-process stdio harness'
    group = 'verification'

    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath

    useJUnitPlatform {
        includeTags 'stress'
    }

    jvmArgs '-Xmx512m', '-Xms256m'

    // Mockito agent + java.base opens (mirror the existing `test` task setup):
    doFirst {
        def mockitoAgent = configurations.testRuntimeClasspath.files.find { it.name.contains('mockito-core') }
        if (mockitoAgent) {
            jvmArgs "-javaagent:${mockitoAgent}"
        }
    }
    jvmArgs '--add-opens', 'java.base/java.lang=ALL-UNNAMED'
    jvmArgs '--add-opens', 'java.base/java.util=ALL-UNNAMED'
    jvmArgs '--add-opens', 'java.base/java.lang.invoke=ALL-UNNAMED'

    shouldRunAfter test
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
        csv.required = false
    }
}

// Exclude duplicate SLF4J provider (we use logback-classic)
configurations.runtimeClasspath {
    exclude group: 'org.slf4j', module: 'slf4j-simple'
}

// Shadow JAR for standalone distribution
shadowJar {
    group 'Build'
    archiveBaseName = libraryName
    archiveVersion = component_version
    archiveClassifier.set('all')

    mergeServiceFiles()

    manifest {
        attributes 'Main-Class': 'io.jafar.mcp.JafarMcpServer'
    }
}

tasks.named('build') {
    dependsOn shadowJar
}

group = 'io.btrace'
version = component_version
description = 'MCP Server for JFR analysis - enables AI agents to analyze Java Flight Recordings'

// Configure Maven publishing to use shadow JAR
mavenPublishing {
    coordinates('io.btrace', 'jfr-mcp', version.toString())
}

// Override publication to use shadow JAR instead of regular JAR
afterEvaluate {
    publishing {
        publications {
            maven(MavenPublication) {
                // Remove the regular jar artifact added by vanniktech plugin
                artifacts.removeIf { it.classifier == null && it.extension == 'jar' && !it.file.name.contains('-all') }
                // Add shadow JAR as main artifact
                artifact(shadowJar) {
                    classifier = ''  // Publish without classifier
                }
                // Remove internal modules from POM (they are embedded in the shadow JAR)
                pom.withXml {
                    def deps = asNode().get('dependencies')
                    if (deps) {
                        deps.each { depsNode ->
                            depsNode.children().removeAll { dep ->
                                dep.groupId.text() == 'io.btrace'
                            }
                        }
                    }
                }
            }
        }
    }
}

// Disable Gradle module metadata for jfr-mcp (it's a distribution, not a library)
tasks.withType(GenerateModuleMetadata).configureEach {
    enabled = false
}
